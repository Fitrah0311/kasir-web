<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kasir - Stok Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .sidebar { height: 100vh; position: fixed; top: 0; left: 0; width: 240px; background-color: #212529; padding-top: 20px; }
        .sidebar a { padding: 12px 15px; text-decoration: none; font-size: 16px; color: #adbcca; display: block; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar .active { background-color: #0d6efd; color: white; }
        .main-content { margin-left: 260px; padding: 20px; }
    </style>
</head>
<body class="bg-light">

    <div class="sidebar">
        <h4 class="text-white text-center mb-4 fw-bold">TB BAROKAH</h4>
        <a href="/" class="active">📦 Stok Barang</a>
        <a href="/penjualan">💰 Hasil Penjualan</a>
    </div>

    <div class="main-content">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow mb-4">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Tambah Stok Barang</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/tambah}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nama Barang</label>
                                <input type="text" name="namaBarang" class="form-control" placeholder="Contoh: Semen Tiga Roda" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Kategori</label>
                                <select name="kategori" class="form-select" required>
                                    <option value="Material Dasar">Material Dasar</option>
                                    <option value="Cat">Cat</option>
                                    <option value="Besi">Besi</option>
                                    <option value="Pipa">Pipa</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Harga Jual</label>
                                <input type="number" name="hargaJual" class="form-control" placeholder="Rp" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Jumlah Stok</label>
                                <input type="number" name="stok" class="form-control" placeholder="Pcs / Sak" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Simpan Barang</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">SISTEM MANAJEMEN STOK TOKO BANGUNAN</h5>
                        <button onclick="exportToExcel()" class="btn btn-warning btn-sm fw-bold text-dark">📊 Cetak Laporan Excel</button>
                    </div>
                    <div class="card-body">
                        <table id="tabelBarang" class="table table-striped table-bordered align-middle">
                            <thead class="table-dark text-center">
                                <tr>
                                    <th>No</th>
                                    <th>Nama Barang</th>
                                    <th>Kategori</th>
                                    <th>Harga Jual</th>
                                    <th>Stok</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(daftarBarang)}">
                                    <td colspan="5" class="text-center text-muted">Belum ada data barang. Silakan tambah di form sebelah kiri!</td>
                                </tr>
                                <tr th:each="barang, iter : ${daftarBarang}">
                                    <td class="text-center" th:text="${iter.count}">1</td>
                                    <td th:text="${barang.namaBarang}">Nama</td>
                                    <td th:text="${barang.kategori}">Kategori</td>
                                    <td class="text-end" th:text="'Rp ' + ${#numbers.formatDecimal(barang.hargaJual, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                                    <td class="text-center fw-bold" 
                                        th:classappend="${barang.stok < 5} ? 'table-danger text-danger' : 'text-success'"
                                        th:text="${barang.stok}">0</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function exportToExcel() {
            var table = document.getElementById("tabelBarang");
            var wb = XLSX.utils.table_to_book(table, {sheet: "Laporan Stok Barang"});
            XLSX.writeFile(wb, "Laporan_Stok_Toko_Bangunan.xlsx");
        }
    </script>
</body>
</html>
