<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - TB Fajar Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1e293b;
            border: none;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="card login-card p-4 text-white">
        <div class="text-center my-3">
            <h3 class="fw-bold text-white mb-1"><i class="fa-solid fa-trowel-bricks text-primary me-2"></i>TB FAJAR BARU</h3>
            <small class="text-white-50">Sistem Kasir & Inventaris Toko</small>
        </div>

        <div th:if="${param.error}" class="alert alert-danger btn-sm py-2 small border-0 text-center bg-danger-subtle text-danger rounded-3 mb-3">
            Username atau Password salah!
        </div>
        <div th:if="${param.logout}" class="alert alert-success btn-sm py-2 small border-0 text-center bg-success-subtle text-success rounded-3 mb-3">
            Otomatis keluar sesi berhasil.
        </div>

        <form th:action="@{/login}" method="POST" class="mt-2">
            <div class="mb-3">
                <label class="form-label small fw-semibold text-white-50">Username Admin</label>
                <div class="input-group">
                    <span class="input-group-text bg-secondary border-0 text-white"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-semibold text-white-50">Password Sesi</label>
                <div class="input-group">
                    <span class="input-group-text bg-secondary border-0 text-white"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2.5 fw-bold shadow-sm rounded-3 mt-1">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Masuk
            </button>
        </form>
    </div>

</body>
</html>
