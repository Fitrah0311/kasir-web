<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kasir - Hasil Penjualan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .sidebar { height: 100vh; position: fixed; top: 0; left: 0; width: 240px; background-color: #212529; padding-top: 20px; }
        .sidebar a { padding: 12px 15px; text-decoration: none; font-size: 16px; color: #adbcca; display: block; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar .active { background-color: #0d6efd; color: white; }
        .main-content { margin-left: 260px; padding: 20px; }
    </style>
</head>
<body class="bg-light">

    <div class="sidebar">
        <h4 class="text-white text-center mb-4 fw-bold">TB BAROKAH</h4>
        <a href="/">📦 Stok Barang</a>
        <a href="/penjualan" class="active">💰 Hasil Penjualan</a>
    </div>

    <div class="main-content">
        <div class="row">
            
            <div class="col-md-4">
                <div class="card shadow mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Input Kasir Penjualan</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/penjualan/simpan}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Pilih Barang</label>
                                <select name="barangId" class="form-select" required>
                                    <option th:each="b : ${daftarBarang}" th:value="${b.id}" th:text="${b.namaBarang} + ' (Stok: ' + ${b.stok} + ')'"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Jumlah Terjual (Qty)</label>
                                <input type="number" name="jumlahJual" class="form-control" min="1" required placeholder="Jumlah Barang">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Simpan Transaksi</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow text-white bg-dark">
                    <div class="card-body text-center">
                        <h5>Total Omset Pendapatan</h5>
                        <h2 class="fw-bold text-warning" th:text="'Rp ' + ${#numbers.formatDecimal(totalPendapatan, 0, 'POINT', 0, 'COMMA')}">Rp 0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Histori & Laporan Penjualan</h5>
                        <button onclick="exportPenjualanToExcel()" class="btn btn-warning btn-sm fw-bold">📈 Cetak Laporan Penjualan (Excel)</button>
                    </div>
                    <div class="card-body">
                        <table id="tabelPenjualan" class="table table-striped table-bordered align-middle">
                            <thead class="table-secondary text-center">
                                <tr>
                                    <th>No</th>
                                    <th>Tanggal</th>
                                    <th>Nama Barang</th>
                                    <th>Qty</th>
                                    <th>Total Harga</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(daftarPenjualan)}">
                                    <td colspan="5" class="text-center text-muted">Belum ada transaksi hari ini.</td>
                                </tr>
                                <tr th:each="p, iter : ${daftarPenjualan}">
                                    <td class="text-center" th:text="${iter.count}">1</td>
                                    <td class="text-center" th:text="${p.tanggalTransaksi}">Tanggal</td>
                                    <td th:text="${p.namaBarang}">Nama</td>
                                    <td class="text-center" th:text="${p.jumlahJual}">0</td>
                                    <td class="text-end fw-bold text-success" th:text="'Rp ' + ${#numbers.formatDecimal(p.totalHarga, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function exportPenjualanToExcel() {
            var table = document.getElementById("tabelPenjualan");
            var wb = XLSX.utils.table_to_book(table, {sheet: "Laporan Hasil Penjualan"});
            XLSX.writeFile(wb, "Laporan_Penjualan_Toko_Bangunan.xlsx");
        }
    </script>
</body>
</html>
